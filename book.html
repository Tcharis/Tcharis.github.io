<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'EB Garamond',serif;background:#1a110a;overflow:hidden;user-select:none}

/* WOOD BG */
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:
    repeating-linear-gradient(88deg,transparent 0,rgba(255,255,255,.012) 1px,transparent 2px,transparent 50px),
    repeating-linear-gradient(2deg,transparent 0,rgba(0,0,0,.04) 1px,transparent 2px,transparent 70px),
    linear-gradient(180deg,#2a1f13 0%,#1a110a 50%,#120c05 100%);
  pointer-events:none}

/* BOOK STAGE */
.stage{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;perspective:1800px}

/* BOOK WRAPPER */
.book{position:relative;width:min(900px,95vw);height:min(620px,90vh);transform-style:preserve-3d}

/* PAGES */
.spread{position:absolute;inset:0;display:flex;border-radius:4px 4px 4px 4px;box-shadow:-12px 4px 40px rgba(0,0,0,.6),12px 4px 40px rgba(0,0,0,.4),0 20px 60px rgba(0,0,0,.5);transform-origin:center;transition:transform .1s}
.page-left,.page-right{width:50%;height:100%;position:relative;overflow:hidden}
.page-left{background:linear-gradient(to right,#f0e8d8 0%,#f7f0e0 100%);border-radius:4px 0 0 4px;
  box-shadow:inset -8px 0 16px rgba(0,0,0,.12)}
.page-right{background:linear-gradient(to left,#ece4d4 0%,#f5eed8 100%);border-radius:0 4px 4px 0;
  box-shadow:inset 8px 0 16px rgba(0,0,0,.08)}

/* SPINE */
.spine{position:absolute;left:50%;top:0;bottom:0;width:16px;transform:translateX(-50%);z-index:10;
  background:linear-gradient(to right,#8b6a3a 0%,#c4a06a 40%,#8b6a3a 100%);
  box-shadow:0 0 8px rgba(0,0,0,.4)}
.spine::before,.spine::after{content:'';position:absolute;left:0;right:0;height:100%;
  background:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.15) 50%,transparent 100%)}

/* PAGE CONTENT */
.page-content{padding:44px 38px 60px 52px;height:100%;overflow:hidden;position:relative}
.page-right .page-content{padding:44px 52px 60px 38px}

/* LEFT MARGIN RED LINE */
.page-left .page-content::before{content:'';position:absolute;left:44px;top:0;bottom:0;width:1px;background:rgba(180,40,40,.2)}

/* LINES */
.page-content::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 27px,rgba(0,0,0,.06) 27px,rgba(0,0,0,.06) 28px);
  pointer-events:none}

/* PAGE NUMBER */
.pnum{position:absolute;bottom:20px;font-family:'DM Mono',monospace;font-size:.65rem;color:rgba(60,40,20,.4);letter-spacing:2px}
.page-left .pnum{left:50%;transform:translateX(-50%)}
.page-right .pnum{right:50%;transform:translateX(50%)}

/* CHAPTER */
.ch-label{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:4px;text-transform:uppercase;color:#8b5e2a;margin-bottom:8px;display:block}
.ch-title{font-size:1.7rem;font-weight:800;color:#1a0e05;line-height:1.15;margin-bottom:20px;padding-bottom:16px;border-bottom:1.5px solid rgba(139,94,42,.2);position:relative}
.ch-title::after{content:'';position:absolute;bottom:-1.5px;left:0;width:48px;height:1.5px;background:#8b5e2a}
.body-txt{font-size:1.02rem;line-height:1.85;color:#2c1f10;margin-bottom:16px}
.body-txt strong{color:#6b3a1f;font-weight:700}
.dropcap::first-letter{font-size:3.2rem;font-weight:800;float:left;line-height:.75;margin:4px 8px 0 0;color:#8b5e2a}
.quote{border-left:3px solid #c4a06a;padding:12px 20px;margin:18px 0;background:rgba(196,160,106,.06);border-radius:0 6px 6px 0}
.quote p{font-style:italic;font-size:1rem;color:#4a3020;line-height:1.7}

/* TIMELINE IN BOOK */
.btl{margin:12px 0}
.btl-item{display:flex;gap:14px;margin-bottom:14px}
.btl-dot{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:#8b5e2a;margin-top:6px;box-shadow:0 0 0 3px rgba(139,94,42,.15)}
.btl-content{}
.btl-title{font-size:.92rem;font-weight:700;color:#1a0e05;margin-bottom:2px}
.btl-co{font-size:.78rem;color:#8b5e2a;font-weight:600;margin-bottom:1px}
.btl-date{font-family:'DM Mono',monospace;font-size:.62rem;color:#9a7a5a;margin-bottom:5px}
.btl-tags{display:flex;flex-wrap:wrap;gap:4px}
.btag{background:rgba(139,94,42,.1);color:#6b3a1f;padding:1px 7px;border-radius:4px;font-size:.68rem}

/* PILLS */
.pills{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.pill{background:rgba(139,94,42,.1);color:#6b3a1f;padding:3px 10px;border-radius:100px;font-size:.75rem}

.bproj-t{font-size:.9rem;font-weight:700;color:#1a0e05;margin-bottom:3px}
.bproj-d{font-size:.78rem;color:#5a3d28;line-height:1.5;margin-bottom:5px}

.clabel{font-family:'DM Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:1px;color:#8b5e2a;margin-bottom:2px}
.cval{font-size:.82rem;color:#2c1f10}

.int-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.int-item{text-align:center;padding:12px 6px;background:rgba(196,160,106,.08);border-radius:8px;border:1px solid rgba(196,160,106,.2)}
.int-ico{font-size:1.3rem;display:block;margin-bottom:4px}
.int-n{font-size:.72rem;color:#5a3d28}

/* COVER */
.cover-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px}
.cov-eyebrow{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:#8b5e2a;margin-bottom:20px}
.cov-h1{font-size:2rem;font-weight:800;color:#1a0e05;line-height:1.1;margin-bottom:8px}
.cov-sub{font-style:italic;font-size:1.1rem;color:#5a3d28;margin-bottom:24px}
.cov-div{width:60px;height:1.5px;background:linear-gradient(90deg,transparent,#c4a06a,transparent);margin:0 auto 20px}
.cov-desc{font-style:italic;font-size:.88rem;color:#7a5a3a;line-height:1.7;max-width:240px;margin-bottom:20px}
.cov-orn{font-size:1.5rem;color:#c4a06a;opacity:.5;margin:12px 0}

/* EPIL */
.epil{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:16px}
.epil-q{font-style:italic;font-size:1.05rem;color:#5a3d28;line-height:1.7;max-width:260px}
.epil-end{font-size:1.8rem;font-weight:800;color:#1a0e05}
.epil-sub{font-size:.82rem;color:#9a7a5a;font-style:italic}

/* NAVIGATION */
.nav-wrap{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:16px;background:rgba(26,17,10,.9);border:1px solid rgba(196,160,106,.25);padding:10px 24px;border-radius:100px;backdrop-filter:blur(12px)}
.nav-btn{background:none;border:none;color:#c4a06a;font-size:1.1rem;cursor:pointer;padding:4px 8px;transition:opacity .2s;font-family:'EB Garamond',serif}
.nav-btn:hover{opacity:.6}
.nav-btn:disabled{opacity:.2;cursor:default}
.pcount{font-family:'DM Mono',monospace;font-size:.65rem;color:rgba(196,160,106,.6);letter-spacing:2px;min-width:50px;text-align:center}

.nav-top{position:fixed;top:16px;left:16px;z-index:100}
.back-btn{background:rgba(26,17,10,.8);border:1px solid rgba(196,160,106,.25);color:#c4a06a;padding:8px 16px;border-radius:8px;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:1px;text-decoration:none;transition:all .2s;backdrop-filter:blur(8px);display:inline-block}
.back-btn:hover{background:rgba(196,160,106,.15)}

/* PAGE TURN ANIMATION */
.spread.turning{animation:pageTurn .5s ease-in-out}
@keyframes pageTurn{
  0%{transform:perspective(1800px) rotateY(0deg)}
  50%{transform:perspective(1800px) rotateY(-8deg) scale(.98)}
  100%{transform:perspective(1800px) rotateY(0deg)}
}
</style>
</head>

let cur = 0;
const plc = document.getElementById('plc');
const prc = document.getElementById('prc');
const pnl = document.getElementById('pnl');
const pnr = document.getElementById('pnr');
const spread = document.getElementById('spread');
const pcount = document.getElementById('pcount');

function render() {
  const p = PAGES[cur];
  plc.innerHTML = p.left;
  prc.innerHTML = p.right;
  pnl.textContent = p.ln;
  pnr.textContent = p.rn;
  pcount.textContent = `${cur+1} / ${PAGES.length}`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === PAGES.length - 1;
}

function turn(dir) {
  spread.classList.add('turning');
  setTimeout(() => {
    cur += dir;
    render();
    spread.classList.remove('turning');
  }, 250);
}

function nextPage() { if (cur < PAGES.length-1) turn(1); }
function prevPage() { if (cur > 0) turn(-1); }

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
});

// Touch/swipe
let tx = 0;
document.addEventListener('touchstart', e => tx = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  const d = tx - e.changedTouches[0].clientX;
  if (d > 50) nextPage();
  if (d < -50) prevPage();
});

render();
</script>
