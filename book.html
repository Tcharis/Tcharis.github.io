<script>

{l:`<div class="cp"><div style="font-size:1.2rem;color:rgba(139,94,42,.35);margin-bottom:20px">✦</div><span style="font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:4px;color:rgba(139,94,42,.35);text-transform:uppercase">Portfolio · 2025</span><div style="font-size:.9rem;color:rgba(139,94,42,.3);margin:12px 0">❧</div><p style="font-size:.78rem;color:#9a7a5a;font-style:italic;margin-top:16px">Aristide TCHETCHE</p></div>`,
r:`<div class="cp"><span class="ch-num" style="text-align:center;display:block">Avant-propos</span><h2 style="font-size:1.15rem;font-weight:800;color:#1a0e05;margin-bottom:10px">Le Voyage des Données</h2><div style="width:40px;height:1px;background:linear-gradient(90deg,transparent,#c4a06a,transparent);margin:10px auto"></div><p style="font-size:.83rem;font-style:italic;color:#5a3d28;line-height:1.7;max-width:240px;text-align:center">"Ce livre retrace mon parcours — de la chimie au data, de Cotonou à Lyon, un chiffre à la fois."</p><div style="font-size:.9rem;color:rgba(139,94,42,.3);margin:12px 0">❧</div><p style="font-size:.7rem;color:#9a7a5a;font-style:italic">Tournez la page pour découvrir mon histoire.</p></div>`,

{l:`<span class="ch-num">Prologue</span><h2 class="ch-title">Le Commencement</h2><p class="bt dc">Tout a commencé par une équation chimique. Puis une série statistique. Puis une question : <em>et si les données pouvaient raconter quelque chose d'important ?</em></p><p class="bt">Je m'appelle <strong>Aristide TCHETCHE</strong>, Data Analyst en alternance chez <strong>Orange Wholesale France</strong> à Lyon. Béninois d'origine, Lyonnais d'adoption.</p><div class="qt"><p>"Curieux, rigoureux et engagé — je transforme les données brutes en décisions éclairées."</p></div>`,
r:`<p class="bt" style="margin-top:10px">Mon parcours est atypique : Licence Chimie <strong>(2e/59)</strong>, Maths/Informatique <strong>(11e/254)</strong>, puis BUT Science des Données. Chaque étape m'a appris à voir le monde avec plus de précision.</p><div style="margin-top:14px"><div class="ti"><div class="td"></div><div><div class="tc">📍 Localisation</div><div class="tt" style="font-size:.78rem">Lyon, Auvergne-Rhône-Alpes</div></div></div><div class="ti"><div class="td"></div><div><div class="tc">🎓 Formation</div><div class="tt" style="font-size:.78rem">BUT SD — IUT Lumière Lyon 2</div></div></div><div class="ti"><div class="td"></div><div><div class="tc">🌍 Langues</div><div class="tt" style="font-size:.78rem">Français · Anglais · Adja</div></div></div><div class="ti"><div class="td"></div><div><div class="tc">✉️ Email</div><div class="tt" style="font-size:.78rem">aristidetchetche6@gmail.com</div></div></div></div>`,
ln:'— 1 —',rn:'— 2 —'},

{l:`<span class="ch-num">Chapitre I</span><h2 class="ch-title">L'Arsenal Technique</h2><p class="bt" style="font-size:.85rem">Des outils forgés à travers trois universités et sept expériences.</p><div class="cl">Analyse & BI</div><div class="pills"><span class="pill">Power BI</span><span class="pill">Business Objects</span><span class="pill">LookerStudio</span><span class="pill">Tableau</span></div><div class="cl">Langages & Stats</div><div class="pills"><span class="pill">Python</span><span class="pill">R</span><span class="pill">SQL / MySQL</span><span class="pill">Statistiques</span></div><div class="cl">Dataviz & Dashboards</div><div class="pills"><span class="pill">R Shiny</span><span class="pill">ggplot2</span><span class="pill">Plotly</span><span class="pill">matplotlib</span></div>`,
r:`<div class="cl" style="margin-top:8px">Outils & Productivité</div><div class="pills"><span class="pill">Excel avancé</span><span class="pill">Power Query</span><span class="pill">VBA</span><span class="pill">SPHINX</span><span class="pill">Git</span><span class="pill">CRM</span></div><div class="qt" style="margin-top:16px"><p>"Un bon analyste ne maîtrise pas tous les outils — il sait lequel utiliser et quand."</p></div><div style="margin-top:14px;padding:11px;background:rgba(139,94,42,.05);border-radius:6px;border:1px solid rgba(139,94,42,.1)"><p style="font-size:.72rem;color:#5a3d28;line-height:1.6">Chez <strong>Orange Wholesale France</strong>, j'utilise quotidiennement Power BI, Power Query et Business Objects pour automatiser des reportings et piloter des KPIs financiers.</p></div>`,
ln:'— 3 —',rn:'— 4 —'},

{l:`<span class="ch-num">Chapitre II</span><h2 class="ch-title">Le Parcours Professionnel</h2><div class="ti"><div class="td hi"></div><div><div class="tt">⭐ Alternant Data Analyst Finance Partner</div><div class="tc">Orange Wholesale France · Lyon</div><div class="tdate">sept. 2025 – août 2027</div><p style="font-size:.72rem;color:#5a3d28;margin-bottom:4px;line-height:1.5">Reporting automatisé, KPIs, données facturation. PC2R (+7 Mds€ CA).</p><div class="ttags"><span class="bt2">Power BI</span><span class="bt2">Power Query</span><span class="bt2">Business Objects</span><span class="bt2">Python</span></div></div></div><div class="ti" style="margin-top:10px"><div class="td"></div><div><div class="tt">Assistant Chargé d'Études Marketing</div><div class="tc">Descours & Cabaud · Lyon</div><div class="tdate">avr. 2025 – mai 2025</div><div class="ttags"><span class="bt2">SPHINX</span><span class="bt2">Excel</span><span class="bt2">VBA</span></div></div></div>`,
r:`<div class="ti" style="margin-top:8px"><div class="td"></div><div><div class="tt">Réceptionniste – Gestion CRM</div><div class="tc">Hôtel de la Croix Rousse · Lyon</div><div class="tdate">févr. 2023 – juil. 2025</div><div class="ttags"><span class="bt2">CRM</span><span class="bt2">Communication</span></div></div></div><div class="ti" style="margin-top:10px"><div class="td"></div><div><div class="tt">Responsable Marketing e-Commerce</div><div class="tc">Softcontrol · Cotonou (remote)</div><div class="tdate">août 2021 – avr. 2025</div><div class="ttags"><span class="bt2">Facebook Ads</span><span class="bt2">TikTok</span><span class="bt2">KPIs</span></div></div></div><div class="ti" style="margin-top:10px"><div class="td"></div><div><div class="tt">Enquêteur Statistique</div><div class="tc">IUT Lyon 2 / Mairie d'Oullins</div><div class="tdate">déc. 2024</div><div class="ttags"><span class="bt2">R</span><span class="bt2">Python</span><span class="bt2">Stats</span></div></div></div><div class="ti" style="margin-top:10px"><div class="td"></div><div><div class="tt">Enseignant Physique-Chimie</div><div class="tc">Collège Enseignement Général · Cotonou</div><div class="tdate">sept. 2019 – juil. 2022</div><div class="ttags"><span class="bt2">Pédagogie</span><span class="bt2">Sciences</span></div></div></div>`,

{l:`<span class="ch-num">Chapitre III</span><h2 class="ch-title">L'Éducation</h2><p class="bt" style="font-size:.85rem">Trois universités, deux pays, un fil conducteur : la rigueur scientifique.</p><div class="ei"><div class="et">BUT Science des Données</div><div class="ec">IUT Lumière Lyon 2</div><div class="ey">2024 – 2027 · En alternance</div><div class="pills" style="margin-top:4px"><span class="pill">Python</span><span class="pill">SQL</span><span class="pill">Power BI</span><span class="pill">R</span></div></div><div class="ei"><div class="et">Licence Mathématiques & Informatique</div><div class="ec">Université Claude Bernard Lyon 1</div><div class="ey">2023 – 2024</div><span class="er">🏆 11e / 254</span><div class="pills" style="margin-top:4px"><span class="pill">C</span><span class="pill">Python</span><span class="pill">Algèbre</span></div></div><div class="ei"><div class="et">Licence Chimie</div><div class="ec">Université d'Abomey-Calavi, Bénin</div><div class="ey">2013 – 2017</div><span class="er">🏆 2e / 59</span></div>`,

let cur=0;
const plc=document.getElementById('plc'),prc=document.getElementById('prc'),pnl=document.getElementById('pnl'),pnr=document.getElementById('pnr'),ni=document.getElementById('ni'),nb=document.getElementById('nb'),bk=document.getElementById('book'),cover=document.getElementById('cover');

function openBook(){
  cover.style.animation='none';
  cover.style.transition='transform .75s cubic-bezier(.4,0,.2,1),opacity .45s ease .3s';
  cover.style.transform='rotateY(-95deg) scale(.85)';
  cover.style.opacity='0';
  setTimeout(()=>{cover.style.display='none';bk.classList.add('open');nb.classList.add('show');render();},700);
}

function render(){
  const p=PG[cur];
  plc.innerHTML=p.l;prc.innerHTML=p.r;pnl.textContent=p.ln;pnr.textContent=p.rn;
  ni.textContent=`${cur+1} / ${PG.length}`;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nbt').disabled=cur===PG.length-1;
}

function anim(cb){bk.classList.add('flip');setTimeout(()=>{cb();bk.classList.remove('flip');},550)}
function nextPage(){if(cur<PG.length-1)anim(()=>{cur++;render();})}
function prevPage(){if(cur>0)anim(()=>{cur--;render();})}

document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextPage();if(e.key==='ArrowLeft')prevPage();});
let tx=0;
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX);
document.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(d>50)nextPage();if(d<-50)prevPage();});
let ls=Date.now();
document.addEventListener('wheel',e=>{const n=Date.now();if(n-ls<700)return;ls=n;if(e.deltaY>0)nextPage();else prevPage();});
</script>
</body>
</html>
