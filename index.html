<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aristide TCHETCHE — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --teal: #0a9396;
      --teal-light: #94d2bd;
      --orange: #ee9b00;
      --dark: #001219;
      --mid: #005f73;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      overflow: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 15% 50%, rgba(0,95,115,0.4) 0%, transparent 55%),
                  radial-gradient(ellipse at 85% 20%, rgba(148,210,189,0.12) 0%, transparent 45%),
                  radial-gradient(ellipse at 60% 80%, rgba(238,155,0,0.08) 0%, transparent 40%),
                  var(--dark);
    }

    .grid-overlay {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(10,147,150,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(10,147,150,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
    }

    @keyframes gridShift {
      0% { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px;
      gap: 0;
    }

    /* ── HEADER ── */
    .header { text-align: center; margin-bottom: 56px; }

    .mono-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem; letter-spacing: 3px;
      color: var(--teal-light);
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      color: #fff;
      line-height: 1.05;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    .header h1 em {
      font-style: italic;
      color: var(--teal-light);
    }

    .header .sub {
      margin-top: 14px;
      font-size: 1rem;
      color: rgba(255,255,255,0.4);
      font-weight: 300;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }

    /* ── CARDS ── */
    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      position: relative;
      width: 240px;
      padding: 36px 28px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      cursor: pointer;
      text-decoration: none;
      display: flex; flex-direction: column; align-items: center;
      gap: 16px;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.4s ease,
                  border-color 0.3s ease,
                  background 0.3s ease;
      opacity: 0;
      overflow: hidden;
    }

    .card:nth-child(1) { animation: fadeUp 0.8s ease 0.7s forwards; }
    .card:nth-child(2) { animation: fadeUp 0.8s ease 0.9s forwards; }
    .card:nth-child(3) { animation: fadeUp 0.8s ease 1.1s forwards; }

    .card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .card-ui::before { background: radial-gradient(circle at 50% 0%, rgba(10,147,150,0.2) 0%, transparent 60%); }
    .card-term::before { background: radial-gradient(circle at 50% 0%, rgba(57,255,20,0.12) 0%, transparent 60%); }
    .card-book::before { background: radial-gradient(circle at 50% 0%, rgba(238,155,0,0.15) 0%, transparent 60%); }

    .card:hover::before { opacity: 1; }

    .card-ui:hover { border-color: rgba(10,147,150,0.5); box-shadow: 0 20px 60px rgba(10,147,150,0.2); transform: translateY(-8px); }
    .card-term:hover { border-color: rgba(57,255,20,0.3); box-shadow: 0 20px 60px rgba(57,255,20,0.12); transform: translateY(-8px); }
    .card-book:hover { border-color: rgba(238,155,0,0.4); box-shadow: 0 20px 60px rgba(238,155,0,0.15); transform: translateY(-8px); }

    .card-icon {
      width: 64px; height: 64px;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      transition: transform 0.3s ease;
    }

    .card:hover .card-icon { transform: scale(1.1) rotate(-3deg); }

    .card-ui .card-icon { background: rgba(10,147,150,0.2); }
    .card-term .card-icon { background: rgba(57,255,20,0.1); }
    .card-book .card-icon { background: rgba(238,155,0,0.15); }

    .card-label {
      font-size: 1.1rem; font-weight: 600;
      color: #fff; letter-spacing: 0.3px;
    }

    .card-desc {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      text-align: center;
      line-height: 1.5;
    }

    .card-arrow {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.2);
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .card:hover .card-arrow { transform: translateX(4px); color: rgba(255,255,255,0.6); }

    /* ── FOOTER HINT ── */
    .hint {
      margin-top: 52px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.3s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .cards { flex-direction: column; align-items: center; }
      .card { width: 100%; max-width: 300px; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-overlay"></div>

  <div class="wrapper">
    <div class="header">
      <p class="mono-tag">// portfolio · aristide tchetche</p>
      <h1>Choisissez votre<br><em>expérience</em></h1>
      <p class="sub">Trois façons d'explorer mon univers data</p>
    </div>

    <div class="cards">
      <a href="normal.html" class="card card-ui">
        <div class="card-icon">🖥️</div>
        <span class="card-label">Interface</span>
        <span class="card-desc">Portfolio moderne,<br>élégant et interactif</span>
        <span class="card-arrow">→</span>
      </a>

      <a href="terminal.html" class="card card-term">
        <div class="card-icon">⌨️</div>
        <span class="card-label">Terminal</span>
        <span class="card-desc">Style CLI,<br>pour les vrais</span>
        <span class="card-arrow">→</span>
      </a>

      <a href="book.html" class="card card-book">
        <div class="card-icon">📖</div>
        <span class="card-label">Histoire</span>
        <span class="card-desc">Narration immersive,<br>un chapitre à la fois</span>
        <span class="card-arrow">→</span>
      </a>
    </div>

    <p class="hint">Cliquez sur une carte pour commencer</p>
  </div>
</body>
</html>
